# Mac（Darwin）はCtrl+b、それ以外はCtrl+a
if-shell 'uname | grep -q Darwin' 'set -g prefix C-b ; bind C-b send-prefix' 'set -g prefix C-a ; bind C-a send-prefix'

set -g mouse on

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g message-style bg=green,fg=black
bind r source-file ~/.tmux.conf \; display "Reloaded!"

set -g status-position top
set -g status-style bg=colour235,fg=colour136
set -g status-left "#[fg=green]● #[fg=green]#H "
set -g status-right "#[fg=cyan]%Y/%m/%d %H:%M"

# LXC（黄色）
if-shell 'systemd-detect-virt 2>/dev/null | grep -q lxc' 'set -g status-style bg=default ; set -g status-left "#[fg=colour226]● #[fg=colour226]#H " ; set -g status-right ""'

# VM/KVM（黄色）
if-shell 'systemd-detect-virt 2>/dev/null | grep -qE "kvm|qemu"' 'set -g status-style bg=default ; set -g status-left "#[fg=colour226]● #[fg=colour226]#H " ; set -g status-right ""'

# PVEホストはオレンジ（最優先）
if-shell '[ -d /etc/pve ]' 'set -g status-style bg=default ; set -g status-left "#[fg=colour208]● #[fg=colour208]#H " ; set -g status-right ""'

set -g base-index 1
setw -g pane-base-index 1

# ウィンドウリストは番号だけ
setw -g window-status-format " #I "
setw -g window-status-current-format " #I "

setw -g mode-keys vi
#EOF
