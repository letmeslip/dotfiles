# ローカルはCtrl+b、SSH先はCtrl+a
if-shell '[ -z "$SSH_CONNECTION" ]' 'set -g prefix C-b ; bind C-b send-prefix' 'set -g prefix C-a ; bind C-a send-prefix'

set -g mouse on

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g message-style bg=green,fg=black
bind r source-file ~/.tmux.conf \; display "Reloaded!"

set -g status-position top
set -g status-style bg=colour235,fg=colour136
set -g status-left "#[fg=green]● #[fg=green]#H "
set -g status-right "#[fg=cyan]%Y/%m/%d %H:%M"

# SSH先（VM/LXC）は黄色＋時計非表示＋背景透明
if-shell '[ -n "$SSH_CONNECTION" ]' 'set -g status-style bg=default ; set -g status-left "#[fg=colour226]● #[fg=colour226]#H " ; set -g status-right ""'

# PVEホストはオレンジ（黄色を上書き）
if-shell '[ -n "$SSH_CONNECTION" ] && echo $(hostname) | grep -q "pve"' 'set -g status-style bg=default ; set -g status-left "#[fg=colour208]● #[fg=colour208]#H " ; set -g status-right ""'

set -g base-index 1
setw -g pane-base-index 1

# ウィンドウリストは番号だけ
setw -g window-status-format " #I "
setw -g window-status-current-format " #I "

setw -g mode-keys vi
#EOF
